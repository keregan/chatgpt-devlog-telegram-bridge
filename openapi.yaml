openapi: 3.1.0

info:
  title: ChatGPT DevLog Telegram Bridge API
  description: API for publishing devlog posts from ChatGPT to a Telegram channel.
  version: 1.0.0

servers:
  - url: https://your-public-domain.com
    description: Production server

paths:
  /publish-devlog:
    post:
      operationId: publishDevlog
      summary: Publish a devlog post to Telegram
      description: Sends a prepared devlog post text to the Telegram channel through the backend service.
      security:
        - BridgeTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  description: Full devlog post text that should be published to Telegram.
                  example: |
                    День 30. Проект "ChatGPT DevLog Telegram Bridge"

                    Добавил Docker-запуск для backend-сервиса.

                    - создан Dockerfile
                    - добавлен docker-compose.yml
                    - сервис запускается в контейнере

                    https://github.com/keregan/chatgpt-devlog-telegram-bridge
      responses:
        "200":
          description: Post was accepted and sent to Telegram.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  post_preview:
                    type: string
                    example: День 30. Проект "ChatGPT DevLog Telegram Bridge"...
                  telegram:
                    type: object
                    properties:
                      status:
                        type: string
                        example: sent
                      message:
                        type: string
                        example: Message sent to Telegram
        "401":
          description: Invalid bridge token.
        "500":
          description: Server configuration error.

components:
  securitySchemes:
    BridgeTokenAuth:
      type: apiKey
      in: header
      name: x-bridge-token